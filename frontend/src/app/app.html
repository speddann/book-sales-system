<header class="navbar">
  <div class="nav-brand" (click)="view = 'shop'">Book Sales</div>

  <nav class="nav-links">
    <!-- Sales dropdown -->
    <div class="dropdown">
      <button class="nav-btn">Sales &#9662;</button>
      <div class="dropdown-menu">
        <button (click)="goToNewSale()">New Sale</button>
        <button (click)="goToOrders()">Orders</button>
      </div>
    </div>

    <!-- Shop -->
    <button class="nav-btn" (click)="view = 'shop'">Shop</button>

    <!-- Operations dropdown -->
    <div class="dropdown">
      <button class="nav-btn">Operations &#9662;</button>
      <div class="dropdown-menu">
        <button (click)="goToInventory()">Inventory</button>
        <button (click)="goToDashboard()">Dashboard</button>
      </div>
    </div>

    <!-- Cart -->
    <button class="nav-btn cart-btn" (click)="view = 'shop'">
      Cart
      @if (cartCount$ | async; as count) {
        @if (count > 0) {
          <span class="badge">{{ count }}</span>
        }
      }
    </button>
  </nav>
</header>

<main class="page-content">
  @if (view === 'shop') {
    <app-book-list (checkoutSuccess)="goToReceipt()"></app-book-list>
  }

  @if (view === 'orders') {
    <app-orders></app-orders>
  }

  @if (view === 'new-sale') {
    <app-new-sale (saleCompleted)="goToReceipt()"></app-new-sale>
  }

  @if (view === 'receipt') {
    <app-receipt></app-receipt>
  }

  @if (view === 'inventory') {
    <app-inventory></app-inventory>
  }

  @if (view === 'dashboard') {
    <app-dashboard></app-dashboard>
  }
</main>
